<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sports Card Vault - Card Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
 <header class="site-header">
   <div class="container nav-wrap">
     <a class="logo" href="#">
       Sports <span class="accent">Card</span> Vault
     </a>
     <button class="nav-toggle" id="navToggle" aria-label="Toggle Navigation" aria-expanded="false" aria-controls="mainNav">☰</button>
      <nav id="mainNav" aria-label="Primary">
       <ul class="nav-links">
         <li><a href="../Hompage/index.html">Home</a></li>
         <li><a href="../Card Database/index.html">Card Database</a></li>
         <li><a href="../Card Details/index.html">Card Details</a></li>
         <li><a href="../Add Edit Cards/index.html">Add/Edit Cards</a></li>
         <li><a href="../About and Contact/index.html">About and Contact</a></li>
       </ul>
     </nav>
   </div>
 </header>

<main class="container main-content">
  <h1>Card Database</h1>
  <section class="toolbar" aria-label="filters">
    <div class="control search-control">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 18a8 8 0 1 1 5.292-14.006A8 8 0 0 1 10 18Zm0-14a6 6 0 1 0 .001 12.001A6 6 0 0 0 10 4Zm11 17-5.1-5.1 1.4-1.4 5.1 5.1-1.4 1.4Z"/></svg>
      <input id="searchInput" type="text" placeholder="Search by player, brand, or year..." />
    </div>
  
    <div class="control filter-control">
      <label class="sr-only" for="sportFilter">Filter by sport</label>
      <select id="sportFilter" aria-label="Filter by sport">
        <option value="">All sports</option>
        <option>Basketball</option>
        <option>Baseball</option>
        <option>Football</option>
        <option>Hockey</option>
        <option>Soccer</option>
      </select>
    </div>
  
    <div class="control filter-control">
      <label class="sr-only" for="gradeFilter">Filter by grade</label>
      <select id="gradeFilter" aria-label="Filter by grade">
        <option value="">All grades</option>
        <option>PSA 10</option>
        <option>PSA 9</option>
        <option>PSA 8</option>
      </select>
    </div>
  </section>

  <p class="count">Showing 8 of 8 cards</p>
  <section class="card-grid">
  </section>
</main>


<footer></footer>
<script src="script.js"></script>
</body>
</html>
